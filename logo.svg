<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Logo Icon -->
  <g transform="translate(400, 110)">
    <!-- Outer circle -->
    <circle cx="0" cy="0" r="70" fill="none" stroke="#000" 
stroke-width="5"/>
    
    <!-- Crossed lines -->
    <line x1="-50" y1="-50" x2="50" y2="50" stroke="#000" 
stroke-width="5"/>
    <line x1="50" y1="-50" x2="-50" y2="50" stroke="#000" 
stroke-width="5"/>
    
    <!-- Wheat (top) -->
    <g transform="translate(0, -35)">
      <!-- Center stalk -->
      <line x1="0" y1="0" x2="0" y2="25" stroke="#000" stroke-width="3"/>
      <!-- Left wheat ear -->
      <path d="M -8 5 L -8 -15 L -6 -18 L -4 -15 L -4 5 Z" fill="#000"/>
      <path d="M -8 -5 L -12 -8 L -10 -12 L -6 -8 Z" fill="#000"/>
      <path d="M -8 0 L -14 -2 L -12 -6 L -6 -4 Z" fill="#000"/>
      <path d="M -8 5 L -12 8 L -10 12 L -6 8 Z" fill="#000"/>
      <!-- Right wheat ear -->
      <path d="M 8 5 L 8 -15 L 6 -18 L 4 -15 L 4 5 Z" fill="#000"/>
      <path d="M 8 -5 L 12 -8 L 10 -12 L 6 -8 Z" fill="#000"/>
      <path d="M 8 0 L 14 -2 L 12 -6 L 6 -4 Z" fill="#000"/>
      <path d="M 8 5 L 12 8 L 10 12 L 6 8 Z" fill="#000"/>
      <!-- Center wheat ear -->
      <path d="M 0 5 L 0 -18 L -2 -20 L 0 -22 L 2 -20 L 0 -18 Z" 
fill="#000"/>
      <path d="M 0 -8 L -4 -10 L -2 -14 L 0 -12 Z" fill="#000"/>
      <path d="M 0 -3 L -6 -5 L -4 -9 L 0 -7 Z" fill="#000"/>
      <path d="M 0 2 L -4 5 L -2 9 L 0 7 Z" fill="#000"/>
    </g>
    
    <!-- Soil/Land (left) -->
    <g transform="translate(-35, 0)">
      <rect x="-15" y="-8" width="12" height="6" fill="#000"/>
      <rect x="-8" y="2" width="12" height="6" fill="#000"/>
      <rect x="2" y="8" width="12" height="6" fill="#000"/>
    </g>
    
    <!-- Water drops (right) -->
    <g transform="translate(35, 0)">
      <path d="M -8 0 C -8 -8 -4 -12 0 -18 C 4 -12 8 -8 8 0 C 8 8 0 10 -8 
0 Z" fill="#000"/>
      <path d="M -15 10 C -15 4 -12 0 -8 -6 C -4 0 0 4 0 10 C 0 16 -8 18 
-15 10 Z" fill="#000" transform="scale(0.7) translate(5, 5)"/>
      <path d="M 5 10 C 5 4 8 0 12 -6 C 16 0 20 4 20 10 C 20 16 12 18 5 10 
Z" fill="#000" transform="scale(0.6) translate(5, 5)"/>
    </g>
    
    <!-- Tree/Plant (bottom) -->
    <g transform="translate(0, 35)">
      <polygon points="0,-15 -12,10 0,5 12,10" fill="#000"/>
      <line x1="0" y1="5" x2="0" y2="15" stroke="#000" stroke-width="3"/>
    </g>
  </g>
  
  <!-- Text: Terragow -->
  <text x="400" y="320" font-family="Arial, Helvetica, sans-serif" 
font-size="130" font-weight="bold" text-anchor="middle" 
fill="#000">Terragow</text>
</svg>
